<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Internship Form</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light d-flex justify-content-center align-items-center min-vh-100">

  <div class="card shadow-sm p-4" style="max-width: 750px; width: 100%;">
    <h2 class="text-center fw-bold mb-4">Internship Form</h2>

    <form id="internship-form" novalidate>

      <!-- Row 1: First Name, Last Name, Email -->
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label for="first-name-input" class="form-label">First Name</label>
          <input
            type="text"
            class="form-control"
            id="first-name-input"
            placeholder=""
            required
          />
          <div class="invalid-feedback">First name required!</div>
        </div>

        <div class="col-md-4">
          <label for="last-name-input" class="form-label">Last Name</label>
          <input
            type="text"
            class="form-control"
            id="last-name-input"
            placeholder=""
            required
          />
          <div class="invalid-feedback">Last name required!</div>
        </div>

        <div class="col-md-4">
          <label for="email-input" class="form-label">Email Address</label>
          <input
            type="email"
            class="form-control"
            id="email-input"
            placeholder="xyz@abc.com"
            required
          />
          <div class="invalid-feedback">Email required!</div>
        </div>
      </div>

      <!-- Row 2: College, Graduation Year, Roll No -->
      <div class="row g-3 mb-3">
        <div class="col-md-5">
          <label for="college-input" class="form-label">College</label>
          <input
            type="text"
            class="form-control"
            id="college-input"
            required
          />
          <div class="invalid-feedback">Please provide a valid college.</div>
        </div>

        <div class="col-md-4">
          <label for="graduation-year-select" class="form-label">Graduation Year</label>
          <select
            class="form-select"
            id="graduation-year-select"
            required
          >
            <option value="" selected disabled>Choose...</option>
            <option value="2020">2020</option>
            <option value="2021">2021</option>
            <option value="2022">2022</option>
            <option value="2023">2023</option>
          </select>
          <div class="invalid-feedback">Please select a valid Graduation Year.</div>
        </div>

        <div class="col-md-3">
          <label for="roll-no-input" class="form-label">Roll No.</label>
          <input
            type="text"
            class="form-control"
            id="roll-no-input"
            required
          />
          <div class="invalid-feedback">Please provide a valid Roll no.</div>
        </div>
      </div>

      <!-- Checkbox -->
      <div class="mb-3">
        <div class="form-check">
          <input
            class="form-check-input"
            type="checkbox"
            id="conditions-checkbox"
            required
          />
          <label class="form-check-label" for="conditions-checkbox">
            Agree to terms and conditions
          </label>
          <div class="invalid-feedback">You must agree before submitting.</div>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary">Submit form</button>

    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const form = document.getElementById('internship-form');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      e.stopPropagation();

      if (!form.checkValidity()) {
        form.classList.add('was-validated');
      } else {
        form.classList.add('was-validated');
        alert('Form submitted successfully!');
      }
    });
  </script>
</body>
</html>
